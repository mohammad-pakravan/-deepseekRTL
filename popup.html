<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 260px;
      padding: 15px;
      font-family: 'Tahoma', sans-serif;
      background: #1e1e2f;
      color: #fff;
      margin: 0;
    }
    h3 {
      margin: 0 0 15px 0;
      text-align: center;
      font-size: 16px;
    }
    .toggle-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #2a2a3a;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    .toggle-label {
      font-size: 14px;
      font-weight: bold;
    }
    .toggle-switch {
      position: relative;
      width: 50px;
      height: 24px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #4caf50;
    }
    input:checked + .slider:before {
      transform: translateX(26px);
    }
    .size-section {
      background: #2a2a3a;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    .size-section label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .size-control {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }
    .size-control button {
      background: #3a3a4a;
      border: none;
      color: white;
      width: 30px;
      height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
    }
    .size-control button:hover {
      background: #4a4a5a;
    }
    .size-value {
      flex: 1;
      text-align: center;
      font-size: 14px;
    }
    input[type="range"] {
      width: 100%;
      margin: 10px 0;
      cursor: pointer;
    }
    .status-badge {
      text-align: center;
      margin-top: 10px;
      padding: 8px;
      border-radius: 8px;
      font-size: 12px;
    }
    .status-active {
      background: #1a3a1a;
      color: #4caf50;
    }
    .status-inactive {
      background: #3a1a1a;
      color: #ff6b6b;
    }
    hr {
      border-color: #3a3a4a;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h3>🔧 Persian RTL Fixer</h3>
  
  <div class="toggle-container">
    <span class="toggle-label">🔘 فعال / غیرفعال</span>
    <label class="toggle-switch">
      <input type="checkbox" id="enableToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="size-section">
    <label>📏 اندازه فونت:</label>
    <div class="size-control">
      <button id="sizeMinus">-</button>
      <span class="size-value" id="sizeValue">متوسط</span>
      <button id="sizePlus">+</button>
    </div>
    <input type="range" id="sizeSlider" min="12" max="22" step="1" value="16">
  </div>

  <div class="status-badge" id="statusText">
    ● فعال
  </div>
  <hr>
  <div class="status-badge" style="background: none; font-size: 10px;">
    📌 فقط در سایت چت فعال است
  </div>

  <script src="popup.js"></script>
</body>
</html>
